<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Static Frontend + PHP Backend</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>My Project</h1>
<p>Data from PHP backend:</p>
<pre id="data"></pre>

<script>
fetch('http://hamedj.atwebpages.com/index.php')
  .then(response => response.text())
  .then(data => {
    document.getElementById('data').innerText = data;
  })
  .catch(err => console.error(err));
</script>
</body>
</html>
